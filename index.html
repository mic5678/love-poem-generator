<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <title>AI Love Poem Generator</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Welcome to the Love Poem Generator!</h1>
      </header>

      <main>
        <form id="love-poem-generator-form">
          <input
            type="text"
            placeholder="Enter the topic of the Love poem"
            autofocus
            required
            autocomplete="off"
            class="instructions"
          />
          <input type="submit" class="submit-button" />
        </form>
        <div class="poem" id="poem"></div>
      </main>
      <footer>
        This AI project was coded by
        <a href="https://github.com/mic5678/" target="_blank"> Micah Evans </a>
        and is
        <a
          href="https://github.com/mic5678/love-poem-generator"
          target="_blank"
        >
          open-sourced on GitHub
        </a>
        and hosted on
        <a href="https://love-poem-ai-generator.netlify.app/" target="_blank">
          Netlify.
        </a>
      </footer>
    </div>

    <script src="src/index.js"></script>
  </body>
</html>
